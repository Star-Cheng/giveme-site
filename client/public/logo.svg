<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：纯黑 -->
  <rect width="100%" height="100%" fill="#000000" />

  <!-- 定义发光滤镜，模拟激光和AI的科技感 -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 主组：应用发光效果 -->
  <g filter="url(#glow)" stroke="#FFFFFF" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- 石头轮廓 (抽象几何，代表坚石与基石) -->
    <!-- 线条较粗，体现稳重感 -->
    <path d="M300,350 L380,280 L480,300 L520,400 L480,500 L380,520 L300,450 Z" stroke-width="5" />
    
    <!-- 内部裂纹/切面 (代表激光切割与AI算力) -->
    <path d="M380,280 L400,400 L300,450" stroke-width="3" />
    <path d="M480,300 L400,400 L480,500" stroke-width="3" />

    <!-- 左下角：神经网络网格光效 (替代原来的激光火花) -->
    <!-- 模拟神经网络节点连接，线条较少，极简风格 -->
    <g transform="translate(280, 430) scale(0.8)" stroke-width="2">
        <!-- 核心节点 -->
        <circle cx="0" cy="0" r="3" fill="#FFFFFF" />
        <!-- 连接线 -->
        <path d="M0,0 L-30,-20" />
        <path d="M0,0 L-20,30" />
        <path d="M0,0 L30,10" />
        <!-- 二级节点与连线 -->
        <path d="M-30,-20 L-40,-50" stroke-width="1.5" />
        <path d="M-30,-20 L0,-40" stroke-width="1.5" />
        <path d="M-20,30 L-50,40" stroke-width="1.5" />
        <path d="M30,10 L60,0" stroke-width="1.5" />
        <path d="M30,10 L50,30" stroke-width="1.5" />
        <!-- 末端节点 -->
        <circle cx="-30" cy="-20" r="2" fill="#FFFFFF" />
        <circle cx="-20" cy="30" r="2" fill="#FFFFFF" />
        <circle cx="30" cy="10" r="2" fill="#FFFFFF" />
        <circle cx="-40" cy="-50" r="1.5" fill="#FFFFFF" />
        <circle cx="0" cy="-40" r="1.5" fill="#FFFFFF" />
        <circle cx="-50" cy="40" r="1.5" fill="#FFFFFF" />
        <circle cx="60" cy="0" r="1.5" fill="#FFFFFF" />
        <circle cx="50" cy="30" r="1.5" fill="#FFFFFF" />
    </g>

    <!-- 右上角：深度学习神经网络结构 (几根线条，极简) -->
    <g transform="translate(520, 280) scale(0.9)" stroke-width="2">
        <!-- 射线 -->
        <line x1="0" y1="0" x2="-100" y2="100" stroke-width="2" />
        <!-- 网络节点 -->
        <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
        <circle cx="-20" cy="20" r="3" fill="#FFFFFF"/>
        <circle cx="-40" cy="40" r="3" fill="#FFFFFF"/>
        <circle cx="-60" cy="20" r="3" fill="#FFFFFF"/>
        <circle cx="-80" cy="40" r="3" fill="#FFFFFF"/>
        <circle cx="-100" cy="100" r="5" fill="#FFFFFF"/>
        <!-- 连接线 -->
        <line x1="0" y1="0" x2="-20" y2="20" />
        <line x1="-20" y1="20" x2="-40" y2="40" />
        <line x1="-20" y1="20" x2="-60" y2="20" />
        <line x1="-40" y1="40" x2="-80" y2="40" />
        <line x1="-60" y1="20" x2="-80" y2="40" />
        <line x1="-80" y1="40" x2="-100" y2="100" />
    </g>

  </g>

  <!-- 文字部分：ZeStone Layser -->
  <text x="50%" y="700" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="300" letter-spacing="4">
    ZeStone Layser
  </text>
</svg>
